<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aaj Tak</title>
<meta name="referrer" content="no-referrer">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 512'><path fill='red' d='M64 64V352H576V64H64zM0 64C0 28.7 28.7 0 64 0H576c35.3 0 64 28.7 64 64V352c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V64zM128 448H512c17.7 0 32 14.3 32 32s-14.3 32-32 32H128c-17.7 0-32-14.3-32-32s14.3-32 32-32z'/></svg>">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.shaka-video-container{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain;background:#000}
</style>
</head>
<body>

<div class="shaka-video-container" id="c">
<video id="v" autoplay muted playsinline preload="metadata"></video>
</div>

<script>
(function(){
  const C = {
    url: "https://feeds.intoday.in/aajtak/api/master.m3u8",
    kid: "",
    key: "",
    cookie: ""
  };

  document.addEventListener("DOMContentLoaded", async () => {
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) return;

    const v = document.getElementById("v"), c = document.getElementById("c");
    v.muted = true;

    const p = new shaka.Player(), ui = new shaka.ui.Overlay(p, c, v);
    await p.attach(v);

   ui.configure({
        addBigPlayButton: true,
        addSeekBar: false,
        controlPanelElements: ['play_pause','time_and_duration','mute','volume','spacer','language','captions','picture_in_picture','quality','fullscreen'],
        seekBarColors: { base: 'white', buffered: 'red', played: 'green' }
      });
    
    p.configure({
      drm: { clearKeys: { [C.kid]: C.key } },
      manifest: { defaultPresentationDelay: 5 },
      streaming: { lowLatencyMode: true, bufferingGoal: 10, rebufferingGoal: 2, safeSeekOffset: 5 }
    });

    let ck = "";
    try {
      const res = await fetch(C.cookie, { cache: "no-store" });
      ck = (await res.json()).cookie || "";
    } catch(e) {}

    if (ck) {
      p.getNetworkingEngine().registerRequestFilter((type, req) => {
        req.headers["Referer"] = "https://www.jiotv.com/";
        req.headers["User-Agent"] = "plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6";
        req.headers["Cookie"] = ck;
        
        let uck = ck.startsWith("__hdnea__=") ? ck.substring(10) : ck;
        if ((type === shaka.net.NetworkingEngine.RequestType.MANIFEST || type === shaka.net.NetworkingEngine.RequestType.SEGMENT) && !req.uris[0].includes("__hdnea__")) {
          req.uris[0] += (req.uris[0].includes("?") ? "&" : "?") + "__hdnea__=" + uck;
        }
      });
    }

    try {
      await p.load(C.url);
      v.play().catch(()=>{});
    } catch(e) {}

    v.addEventListener("play", () => { v.muted = true; }, { once: true });
  });
})();
</script>
</body>
</html>
