<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aaj Tak</title>
<meta name="referrer" content="no-referrer">
<link rel="icon" type="image/svg" href="https://www.svgviewer.dev/s/SlHhucmD">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
.shaka-video-container{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain;background:#000}
</style>
</head>
<body>

<div class="shaka-video-container" id="c">
<video id="v" autoplay muted playsinline preload="metadata"></video>
</div>

<script>
(function(){
  const url = "https://feeds.intoday.in/aajtak/api/aajtakhd/master.m3u8";

  document.addEventListener("DOMContentLoaded", async () => {
    shaka.polyfill.installAll();
    if (!shaka.Player.isBrowserSupported()) return;

    const v = document.getElementById("v"), c = document.getElementById("c");
    v.muted = true;

    const p = new shaka.Player(), ui = new shaka.ui.Overlay(p, c, v);
    await p.attach(v);

    ui.configure({
        addBigPlayButton: true,
        addSeekBar: false,
        controlPanelElements: ['play_pause','time_and_duration','mute','volume','spacer','language','captions','picture_in_picture','quality','fullscreen'],
        seekBarColors: { base: 'white', buffered: 'red', played: 'green' }
      });
    
    p.configure({
      manifest: { defaultPresentationDelay: 5 },
      streaming: { lowLatencyMode: true, bufferingGoal: 10, rebufferingGoal: 2, safeSeekOffset: 5 }
    });

    try {
      await p.load(url);
      v.play().catch(()=>{});
    } catch(e) {
      console.error("Error loading stream", e);
    }

    v.addEventListener("play", () => { v.muted = true; }, { once: true });
  });
})();
</script>
</body>
</html>
